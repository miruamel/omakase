name: Build Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun run build

      - name: Rename binary
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv dist/cli.js dist/omakase.exe
          else
            mv dist/cli.js dist/omakase
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omakase-${{ runner.os }}
          path: dist/omakase*
          retention-days: 30
